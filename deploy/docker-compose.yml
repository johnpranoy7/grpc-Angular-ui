name: grpc-applications-stack

services:
  grpc-server:
    image: johnpranoy7/grpc-server:latest
    container_name: grpc-server
    restart: unless-stopped
    networks:
      - grpc-net
    expose:
      - "9090"
      - "9091"

  grpc-client:
    image: johnpranoy7/grpc-client:latest
    container_name: grpc-client
    restart: unless-stopped
    depends_on:
      - grpc-server
    environment:
      SPRING_GRPC_CLIENT_CHANNEL_STUDENTSERVICE_TARGET: static://grpc-server:9090
      APP_CORS_ALLOWED_ORIGINS: ${UI_ORIGIN}
    ports:
      - "${BFF_HOST_PORT:-8080}:8080"
    networks:
      - grpc-net

  grpc-demo-ui:
    image: johnpranoy7/grpc-demo-ui:latest
    container_name: grpc-demo-ui
    restart: unless-stopped
    ports:
      - "${UI_HOST_PORT:-80}:80"
    volumes:
      - ./nginx-ui.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - grpc-net

networks:
  grpc-net:
    driver: bridge
